name: Build & Release FluentQML Gallery

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.2.3)"
        required: false

permissions:
  contents: write

concurrency:
  group: build-${{ github.ref_name || github.event.inputs.tag || github.run_id }}
  cancel-in-progress: true

jobs:
  build-pyinstaller:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            icon: "examples/assets/gallery.ico"
            artifact_name: "FluentQMLGallery-Windows-x64-pyinstaller-portable.zip"
          - os: macos-latest
            icon: "examples/assets/gallery.icns"
            artifact_name: "FluentQMLGallery-macOS-pyinstaller.zip"

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v5

      - name: 📦 Set up Python & Install uv
        uses: astral-sh/setup-uv@v7

      - name: 📦 Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-build-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-build-

      - name: 📦 Install dependencies
        run: |
          uv sync

      - name: 🧱 Build Gallery QRC
        run: |
          uv run python examples/scripts/build_gallery_qrc.py

      - name: 🔨 Build FluentQML Gallery
        shell: bash
        run: |
          uv run python scripts/package_gallery.py \
            --icon "${{ matrix.icon }}" \
            --name FluentQMLGallery

      - name: 📦 Create archive
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            curl -OLk# https://www.stahlworks.com/dev/zip.exe
            ./zip.exe -r -q "dist/${{ matrix.artifact_name }}" dist/FluentQMLGallery/*
          else
            cd dist && ditto -c -k --sequesterRsrc --keepParent FluentQMLGallery.app "${{ matrix.artifact_name }}" && cd ..
          fi
          ls -lh dist/

      - name: ☁️ Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}

  build-nuitka:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: windows
            arch: x64
            icon: "examples/assets/gallery.ico"
            artifact_name: "FluentQMLGallery-Windows-x64-nuitka-portable.zip"
          - os: macos-15-intel
            target: macos
            arch: x64
            icon: "examples/assets/gallery.icns"
            artifact_name: "FluentQMLGallery-macOS-x64-nuitka.zip"
          - os: macos-15
            target: macos
            arch: arm64
            icon: "examples/assets/gallery.icns"
            artifact_name: "FluentQMLGallery-macOS-arm64-nuitka.zip"

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v5

      - name: 📦 Set up Python & Install uv
        uses: astral-sh/setup-uv@v7

      - name: 📦 Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-nuitka-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-nuitka-

      - name: 📦 Install dependencies
        run: |
          uv sync

      - name: 🔨 Build FluentQML Gallery with Nuitka
        shell: bash
        run: |
          uv run --with nuitka python scripts/package_gallery_nuitka.py \
            --target "${{ matrix.target }}" \
            --arch "${{ matrix.arch }}" \
            --icon "${{ matrix.icon }}" \
            --name FluentQMLGallery \
            --archive \
            --clean

      - name: ☁️ Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}

  release:
    needs: [build-pyinstaller, build-nuitka]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: ⬇️ Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist/

      - name: 🧱 Set up git-cliff
        uses: kenji-miyake/setup-git-cliff@v2

      - name: 📜 Generate CHANGELOG
        id: changelog
        env:
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${{ github.ref_name }}"
          if [ -z "$TAG_NAME" ]; then
            TAG_NAME="${{ github.event.inputs.tag }}"
          fi
          PREVIOUS_TAG="$(git tag --sort=-v:refname | grep -v "^${TAG_NAME}$" | head -n 1 || true)"
          if [ -n "$PREVIOUS_TAG" ]; then
            git cliff "${PREVIOUS_TAG}..${TAG_NAME}" --tag "$TAG_NAME" --config .git-cliff.toml --github-repo "${{ github.repository }}" --output changelog.md
          else
            git cliff --tag "$TAG_NAME" --config .git-cliff.toml --github-repo "${{ github.repository }}" --output changelog.md
          fi
          # cat changelog.md >> $GITHUB_STEP_SUMMARY >> $GITHUB_OUTPUT

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: FluentQML Gallery ${{ github.ref_name || github.event.inputs.tag }}
          tag_name: ${{ github.ref_name || github.event.inputs.tag }}
          body_path: changelog.md
          overwrite_files: true
          files: dist/*/FluentQMLGallery-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
